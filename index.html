<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GRC Backbone – Clickable Prototype</title>

<style>
  body { font-family: "Segoe UI", Arial, sans-serif; margin: 0; background: #f3f5f7; }
  header { background: #00243d; color: white; padding: 16px; }
  nav button {
    margin-right: 8px; padding: 8px 14px;
    border: none; background: #005ead; color: white;
    cursor: pointer; border-radius: 4px;
  }
  .container { padding: 24px; }
  .card {
    background: white; padding: 20px; margin-bottom: 16px;
    border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .hidden { display: none; }
  .cta { background: #00b0a6; color: white; padding: 10px 16px; border: none; border-radius: 4px; cursor: pointer; }
  .cta:hover { background: #009693; }
  .warn { background: #ffb000; color: black; padding: 10px 16px; border: none; border-radius: 4px; cursor: pointer; }
  .warn:hover { background: #e6a000; }
  .danger { background: #d83b01; color: white; padding: 10px 16px; border: none; border-radius: 4px; cursor: pointer; }
  .danger:hover { background: #a52a00; }
  label { margin-top: 12px; display: block; font-weight: 600; }
  textarea, select { width: 100%; margin-top: 6px; padding: 6px; box-sizing: border-box; }
  .audit-entry { padding: 8px; border-left: 3px solid #00b0a6; margin-top: 8px; background: #f9f9f9; }
  .success { background: #107c10; color: white; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
</style>
</head>

<body>

<header>
  <h1>GRC Backbone – Clickable UX Prototype</h1>
  <nav id="nav"></nav>
</header>

<div class="container">

<!-- ROLE SELECT -->
<div id="roleSelect" class="card">
  <h2>Select Role</h2>
  <button class="cta" onclick="UIController.loadRole('performer')">Control Performer</button>
  <button class="cta" onclick="UIController.loadRole('reviewer')">Reviewer</button>
  <button class="cta" onclick="UIController.loadRole('grc')">GRC Team</button>
</div>

<!-- PERFORMER -->
<div id="performer" class="hidden">
  <div class="card">
    <h2>My CSAs</h2>
    <p><b>Bank Reconciliation – Denmark – March</b></p>
    <button class="cta" onclick="UIController.showCSA()">Perform CSA</button>
    <button class="warn" onclick="WorkflowService.delegate()">Delegate</button>
  </div>
</div>

<!-- CSA -->
<div id="csa" class="hidden">
  <div class="card">
    <h2>Control Self‑Assessment</h2>

    <label>Result</label>
    <select id="csaResult">
      <option>Effective</option>
      <option>Ineffective</option>
    </select>

    <label>Evidence</label>
    <input type="file" />

    <label>Comment</label>
    <textarea id="csaComment" rows="4"></textarea>

    <br/><br/>
    <button class="cta" onclick="CSAService.submit()">Submit for review</button>
  </div>
</div>

<!-- REVIEWER -->
<div id="reviewer" class="hidden">
  <div class="card">
    <h2>Pending Reviews</h2>
    <p><b>Bank Reconciliation – Denmark – March</b></p>
    <button class="cta" onclick="WorkflowService.approve()">Approve</button>
    <button class="danger" onclick="WorkflowService.reject()">Reject</button>
  </div>
</div>

<!-- GRC -->
<div id="grc" class="hidden">
  <div class="card">
    <h2>GRC Dashboard</h2>
    <ul>
      <li>CSA completion: 92%</li>
      <li>Open issues: 14</li>
      <li>Overdue CSAs: 3</li>
    </ul>
  </div>

  <div class="card">
    <h2>Audit Trail</h2>
    <div id="auditLog"></div>
  </div>
</div>

</div>

<script>
/* ===========================
   STATE STORE (mock DB)
   =========================== */
const StateStore = {
  currentRole: null,
  csa: { status: "DRAFT", result: "", comment: "" },
  audit: [],
  delegated: false,
  csaReviewPending: false
};

/* ===========================
   AUDIT SERVICE
   =========================== */
const AuditService = {
  log(event) {
    const timestamp = new Date().toLocaleTimeString();
    const logEntry = `[${timestamp}] ${event}`;
    StateStore.audit.push(logEntry);
    this.render();
  },
  render() {
    const auditLog = document.getElementById('auditLog');
    if (auditLog) {
      auditLog.innerHTML = StateStore.audit.map(entry => 
        `<div class="audit-entry">${entry}</div>`
      ).join('');
    }
  }
};

/* ===========================
   UI CONTROLLER
   =========================== */
const UIController = {
  hideAll() {
    document.getElementById('roleSelect').classList.add('hidden');
    document.getElementById('performer').classList.add('hidden');
    document.getElementById('csa').classList.add('hidden');
    document.getElementById('reviewer').classList.add('hidden');
    document.getElementById('grc').classList.add('hidden');
  },
  showBackButton(role) {
    const nav = document.getElementById('nav');
    nav.innerHTML = `<button class="cta" onclick="UIController.loadRole('role-select')">← Back</button>`;
  },
  loadRole(role) {
    this.hideAll();
    StateStore.currentRole = role;
    
    if (role === 'performer') {
      document.getElementById('performer').classList.remove('hidden');
      this.showBackButton('performer');
      AuditService.log('User switched to Performer role');
    } else if (role === 'reviewer') {
      document.getElementById('reviewer').classList.remove('hidden');
      this.showBackButton('reviewer');
      AuditService.log('User switched to Reviewer role');
    } else if (role === 'grc') {
      document.getElementById('grc').classList.remove('hidden');
      this.showBackButton('grc');
      AuditService.log('User switched to GRC Team role');
    } else if (role === 'role-select') {
      document.getElementById('roleSelect').classList.remove('hidden');
      document.getElementById('nav').innerHTML = '';
      AuditService.log('User returned to role selection');
    }
  },
  showCSA() {
    document.getElementById('performer').classList.add('hidden');
    document.getElementById('csa').classList.remove('hidden');
    AuditService.log('Control Performer started CSA form');
  }
};

/* ===========================
   WORKFLOW SERVICE
   =========================== */
const WorkflowService = {
  approve() {
    AuditService.log('Reviewer APPROVED: Bank Reconciliation – Denmark – March');
    alert('✓ CSA Approved successfully!\n\nThe control has been marked as effective.');
    StateStore.csaReviewPending = false;
  },
  reject() {
    AuditService.log('Reviewer REJECTED: Bank Reconciliation – Denmark – March');
    alert('✗ CSA Rejected.\n\nPlease request more evidence or correction.');
    StateStore.csaReviewPending = false;
  },
  delegate() {
    AuditService.log('Control Performer delegated task to another user');
    alert('📋 Task delegated successfully!');
    StateStore.delegated = true;
  }
};

/* ===========================
   CSA SERVICE
   =========================== */
const CSAService = {
  submit() {
    const result = document.getElementById('csaResult').value;
    const comment = document.getElementById('csaComment').value;
    
    if (!comment.trim()) {
      alert('⚠️ Please add a comment before submitting.');
      return;
    }
    
    StateStore.csa = {
      status: "SUBMITTED",
      result: result,
      comment: comment,
      submittedAt: new Date().toLocaleString()
    };
    
    AuditService.log(`CSA Submitted: Result="${result}", Comment="${comment.substring(0, 30)}..."`);
    StateStore.csaReviewPending = true;
    
    alert(`✓ CSA submitted for review!\n\nResult: ${result}\nComment: ${comment.substring(0, 50)}...`);
    
    // Reset form
    document.getElementById('csaComment').value = '';
    document.getElementById('csaResult').value = 'Effective';
    
    // Return to performer view
    document.getElementById('csa').classList.add('hidden');
    document.getElementById('performer').classList.remove('hidden');
  }
};

// Initialize
window.onload = function() {
  AuditService.log('Application loaded');
  AuditService.log('User ready to select role');
};
</script>

</body>
</html>
